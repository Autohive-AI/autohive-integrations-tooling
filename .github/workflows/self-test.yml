name: Self Test

on:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/self-test.yml'

  pull_request:
    branches: [master, main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/self-test.yml'

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    name: Test Validation Scripts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dev tools
        run: pip install -r requirements-dev.txt -q

      - name: Test validate_integration.py — good integrations pass
        run: |
          python scripts/validate_integration.py tests/examples/good-integration
          python scripts/validate_integration.py tests/examples/modular-integration
          python scripts/validate_integration.py tests/sample-api
          python scripts/validate_integration.py tests/examples/netlify

      - name: Test validate_integration.py — bad integration fails
        run: |
          if python scripts/validate_integration.py tests/examples/Bad-Integration 2>&1; then
            echo "❌ Expected validation to fail for Bad-Integration"
            exit 1
          fi
          echo "✅ Bad-Integration correctly rejected"

      - name: Test validate_integration.py — auto-discovery skips tests/
        run: |
          OUTPUT=$(python scripts/validate_integration.py 2>&1)
          if echo "$OUTPUT" | grep -q "Bad-Integration\|good-integration\|sample-api"; then
            echo "❌ Auto-discovery should not pick up test examples"
            exit 1
          fi
          echo "✅ Auto-discovery correctly skips tests/"

      - name: Test check_imports.py — valid imports
        run: |
          python scripts/check_imports.py tests/examples/submodule-imports/valid_submodules.py
          python scripts/check_imports.py tests/examples/relative-imports/mypackage/subpackage/valid_relative.py

      - name: Test check_imports.py — invalid imports detected
        run: |
          if python scripts/check_imports.py tests/examples/submodule-imports/invalid_submodules.py 2>&1; then
            echo "❌ Expected import check to fail for invalid_submodules.py"
            exit 1
          fi
          echo "✅ Invalid submodule imports correctly detected"

      - name: Test check_imports.py — invalid relative imports detected
        run: |
          if python scripts/check_imports.py tests/examples/relative-imports/mypackage/subpackage/invalid_relative.py 2>&1; then
            echo "❌ Expected import check to fail for invalid_relative.py"
            exit 1
          fi
          echo "✅ Invalid relative imports correctly detected"

      - name: Test check_imports.py — verify-names flag
        run: |
          python scripts/check_imports.py --verify-names tests/examples/name-verification/valid_names.py

          if python scripts/check_imports.py --verify-names tests/examples/name-verification/invalid_names.py 2>&1; then
            echo "❌ Expected --verify-names to fail for invalid_names.py"
            exit 1
          fi
          echo "✅ Name verification correctly detected invalid names"

      - name: Test check_imports.py — error exit code for missing file
        run: |
          python scripts/check_imports.py nonexistent.py 2>&1 || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -ne 2 ]; then
            echo "❌ Expected exit code 2 for missing file, got ${EXIT_CODE:-0}"
            exit 1
          fi
          echo "✅ Missing file correctly returns exit code 2"

      - name: Test check_code.py — good integration
        run: python scripts/check_code.py tests/examples/good-integration

      - name: Test check_code.py — modular integration
        run: python scripts/check_code.py tests/examples/modular-integration

      - name: Test check_code.py — long lines pass with ruff.toml config
        run: python scripts/check_code.py tests/examples/long-lines-integration

      - name: Test check_code.py — ruff.toml applied from different working directory
        run: |
          cd /tmp
          python "$GITHUB_WORKSPACE/scripts/check_code.py" "$GITHUB_WORKSPACE/tests/examples/long-lines-integration"

      - name: Test check_config_sync.py — good integration passes
        run: python scripts/check_config_sync.py tests/examples/good-integration

      - name: Test check_config_sync.py — mismatched config detected
        run: |
          if python scripts/check_config_sync.py tests/examples/config-mismatch 2>&1; then
            echo "❌ Expected config sync check to fail for config-mismatch"
            exit 1
          fi
          echo "✅ Config-code mismatch correctly detected"

      - name: Test validate_integration.py — deprecated SDK pin warns
        run: |
          OUTPUT=$(python scripts/validate_integration.py tests/examples/sdk-deprecated-pin 2>&1)
          if ! echo "$OUTPUT" | grep -q "deprecated"; then
            echo "❌ Expected deprecation warning for sdk-deprecated-pin (~=1.0.2)"
            echo "$OUTPUT"
            exit 1
          fi
          echo "✅ Deprecated SDK pin correctly warned"

      - name: Test validate_integration.py — wrong icon size fails
        run: |
          if python scripts/validate_integration.py tests/examples/bad-icon 2>&1; then
            echo "❌ Expected validation to fail for bad-icon (100x100 PNG)"
            exit 1
          fi
          echo "✅ Wrong icon size correctly rejected"

      - name: Test check_fetch_pattern.py — good integration passes (SDK 2.x with .data)
        run: python scripts/check_fetch_pattern.py tests/examples/good-integration

      - name: Test check_fetch_pattern.py — SDK 1.x old pattern is fine
        run: python scripts/check_fetch_pattern.py tests/examples/sdk-deprecated-pin

      - name: Test check_fetch_pattern.py — SDK 2.x old pattern detected
        run: |
          if python scripts/check_fetch_pattern.py tests/examples/sdk-v2-old-fetch-pattern 2>&1; then
            echo "❌ Expected fetch pattern check to fail for sdk-v2-old-fetch-pattern"
            exit 1
          fi
          echo "✅ Old fetch pattern with SDK 2.x correctly detected"

      - name: Test check_version_bump.py — good integration passes (no changes vs HEAD)
        run: python scripts/check_version_bump.py HEAD tests/examples/good-integration

      - name: Test check_version_bump.py — missing version detected for new integration
        run: |
          # Create a temp integration with no version in config.json
          mkdir -p /tmp/test-no-version
          echo '{"name": "test", "description": "test", "entry_point": "main.py", "actions": {}}' > /tmp/test-no-version/config.json
          if python scripts/check_version_bump.py HEAD /tmp/test-no-version 2>&1; then
            echo "❌ Expected version check to fail for integration without version"
            exit 1
          fi
          echo "✅ Missing version correctly detected"
          rm -rf /tmp/test-no-version

      - name: Test check_version_bump.py — missing directory is skipped (not failed)
        run: python scripts/check_version_bump.py HEAD nonexistent-directory

      - name: Test get_changed_dirs.py — missing argument
        run: |
          if python scripts/get_changed_dirs.py 2>&1; then
            echo "❌ Expected failure with no arguments"
            exit 1
          fi
          echo "✅ Missing argument correctly rejected"
