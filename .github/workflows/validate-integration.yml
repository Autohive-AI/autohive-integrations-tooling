name: Validate Integration

on:
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Integration
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dev tools
        run: pip install -r requirements-dev.txt -q

      - name: Get changed integration folders
        id: changed
        run: |
          DIRS=$(python scripts/get_changed_dirs.py "origin/${{ github.base_ref }}")
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT

      - name: Structure Check
        id: structure
        if: steps.changed.outputs.dirs != ''
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python scripts/validate_integration.py ${{ steps.changed.outputs.dirs }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Code Check
        id: code
        if: steps.changed.outputs.dirs != ''
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python scripts/check_code.py ${{ steps.changed.outputs.dirs }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: README Check
        id: readme
        if: steps.changed.outputs.dirs != ''
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python scripts/check_readme.py "origin/${{ github.base_ref }}" ${{ steps.changed.outputs.dirs }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Post PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: validation-results
          message: |
            ## 🔍 Integration Validation Results

            **Changed directories:** `${{ steps.changed.outputs.dirs || '(none)' }}`

            | Check | Result |
            |-------|--------|
            | Structure | ${{ steps.changed.outputs.dirs == '' && '⏭️ Skipped' || (steps.structure.outcome == 'success' && '✅ Passed' || '❌ Failed') }} |
            | Code | ${{ steps.changed.outputs.dirs == '' && '⏭️ Skipped' || (steps.code.outcome == 'success' && '✅ Passed' || '❌ Failed') }} |
            | README | ${{ steps.changed.outputs.dirs == '' && '⏭️ Skipped' || (steps.readme.outcome == 'success' && '✅ Passed' || '❌ Failed') }} |

            ${{ steps.structure.outcome == 'failure' && format('
            <details><summary>❌ Structure Check output</summary>

            ```
            {0}
            ```

            </details>', steps.structure.outputs.output) || '' }}
            ${{ steps.code.outcome == 'failure' && format('
            <details><summary>❌ Code Check output</summary>

            ```
            {0}
            ```

            </details>', steps.code.outputs.output) || '' }}
            ${{ steps.readme.outcome == 'failure' && format('
            <details><summary>❌ README Check output</summary>

            ```
            {0}
            ```

            </details>', steps.readme.outputs.output) || '' }}

      - name: Fail if any check failed
        if: always() && (steps.structure.outcome == 'failure' || steps.code.outcome == 'failure' || steps.readme.outcome == 'failure')
        run: exit 1
