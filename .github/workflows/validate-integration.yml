name: Validate Integration

on:
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dev tools
        run: uv pip install -r requirements-dev.txt --system -q

      - name: Get changed integration folders
        id: changed
        run: |
          DIRS=$(python scripts/get_changed_dirs.py "origin/${{ github.base_ref }}")
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT

      - name: Structure Check
        if: steps.changed.outputs.dirs != ''
        run: python scripts/validate_integration.py "${{ steps.changed.outputs.dirs }}"

      - name: Code Check
        if: steps.changed.outputs.dirs != ''
        run: python scripts/check_code.py "${{ steps.changed.outputs.dirs }}"

      - name: README Check
        if: steps.changed.outputs.dirs != ''
        run: python scripts/check_readme.py "origin/${{ github.base_ref }}" "${{ steps.changed.outputs.dirs }}"
