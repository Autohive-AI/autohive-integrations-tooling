name: Validate Integration

on:
  push:
    paths:
      - '**'
      - '!.github/**'
      - '!README.md'
      - '!INTEGRATION_CHECKLIST.md'
      - '!scripts/**'

  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Get changed integration folders
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD~1"
          fi
          DIRS=$(bash scripts/get_changed_dirs.sh "$BASE_REF")
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT

      - name: Structure Check
        if: steps.changed.outputs.dirs != ''
        run: python scripts/validate_integration.py ${{ steps.changed.outputs.dirs }}

      - name: Code Check
        if: steps.changed.outputs.dirs != ''
        run: bash scripts/check_code.sh ${{ steps.changed.outputs.dirs }}

      - name: README Check
        if: github.event_name == 'pull_request' && steps.changed.outputs.dirs != ''
        run: bash scripts/check_readme.sh "origin/${{ github.base_ref }}" ${{ steps.changed.outputs.dirs }}
