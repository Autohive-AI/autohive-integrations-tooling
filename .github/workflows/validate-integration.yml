name: Validate Integration

on:
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Integration
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dev tools
        run: pip install -r requirements-dev.txt -q

      - name: Get changed integration folders
        id: changed
        run: |
          DIRS=$(python scripts/get_changed_dirs.py "origin/${{ github.base_ref }}")
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT
          MSG=$(git log -1 --format=%s ${{ github.event.pull_request.head.sha }})
          echo "commit_msg=$MSG" >> $GITHUB_OUTPUT

      - name: Structure Check
        id: structure
        if: steps.changed.outputs.dirs != ''
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python scripts/validate_integration.py ${{ steps.changed.outputs.dirs }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Code Check
        id: code
        if: steps.changed.outputs.dirs != ''
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python scripts/check_code.py ${{ steps.changed.outputs.dirs }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: README Check
        id: readme
        if: steps.changed.outputs.dirs != ''
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python scripts/check_readme.py "origin/${{ github.base_ref }}" ${{ steps.changed.outputs.dirs }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Delete stale PR comment
        if: always() && steps.changed.outputs.dirs == ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: validation-results
          delete: true

      - name: Post PR comment
        if: always() && steps.changed.outputs.dirs != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: validation-results
          message: |
            ## 🔍 Integration Validation Results

            **Commit:** [`${{ github.event.pull_request.head.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }}) · ${{ steps.changed.outputs.commit_msg }}
            **Updated:** ${{ github.event.pull_request.updated_at }}

            **Changed directories:** `${{ steps.changed.outputs.dirs }}`

            | Check | Result |
            |-------|--------|
            | Structure | ${{ steps.structure.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Code | ${{ steps.code.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
            | README | ${{ steps.readme.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |

            <details><summary>${{ steps.structure.outcome == 'success' && '✅' || '❌' }} Structure Check output</summary>

            ```
            ${{ steps.structure.outputs.output }}
            ```

            </details>

            <details><summary>${{ steps.code.outcome == 'success' && '✅' || '❌' }} Code Check output</summary>

            ```
            ${{ steps.code.outputs.output }}
            ```

            </details>

            <details><summary>${{ steps.readme.outcome == 'success' && '✅' || '❌' }} README Check output</summary>

            ```
            ${{ steps.readme.outputs.output }}
            ```

            </details>

      - name: Fail if any check failed
        if: always() && (steps.structure.outcome == 'failure' || steps.code.outcome == 'failure' || steps.readme.outcome == 'failure')
        run: exit 1
