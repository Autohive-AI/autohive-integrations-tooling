name: Validate Integration

on:
  push:
    paths:
      - '**'
      - '!.github/**'
      - '!README.md'
      - '!INTEGRATION_CHECKLIST.md'
      - '!scripts/**'

  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Integration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Get changed integration folders
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD~1"
          fi

          CHANGED_FILES=$(git diff --name-only $BASE_REF HEAD 2>/dev/null || echo "")

          CHANGED_DIRS=""
          for file in $CHANGED_FILES; do
            DIR=$(echo "$file" | cut -d'/' -f1)
            if [[ "$file" == *"/"* ]] && \
               [[ "$DIR" != ".github" ]] && \
               [[ "$DIR" != "scripts" ]] && \
               [[ "$DIR" != "template-structure" ]]; then
              if [[ ! " $CHANGED_DIRS " =~ " $DIR " ]]; then
                CHANGED_DIRS="$CHANGED_DIRS $DIR"
              fi
            fi
          done

          CHANGED_DIRS=$(echo "$CHANGED_DIRS" | xargs)
          echo "Changed: $CHANGED_DIRS"
          echo "dirs=$CHANGED_DIRS" >> $GITHUB_OUTPUT

      - name: Structure Check
        if: steps.changed-files.outputs.dirs != ''
        run: |
          echo ""
          echo "========================================"
          echo "📁 STRUCTURE CHECK"
          echo "========================================"
          echo ""
          python scripts/validate_integration.py ${{ steps.changed-files.outputs.dirs }}

      - name: Code Check
        if: steps.changed-files.outputs.dirs != ''
        run: |
          echo ""
          echo "========================================"
          echo "🔍 CODE CHECK"
          echo "========================================"
          echo ""
          FAILED=0

          for dir in ${{ steps.changed-files.outputs.dirs }}; do
            echo "----------------------------------------"
            echo "Checking: $dir"
            echo "----------------------------------------"
            echo ""

            # Install dependencies
            if [ -f "$dir/requirements.txt" ]; then
              echo "📦 Installing dependencies..."
              pip install -r "$dir/requirements.txt" -q 2>&1 || true
              echo ""
            fi

            # Syntax check
            echo "🐍 Checking Python syntax..."
            SYNTAX_ERRORS=""
            for pyfile in $(find "$dir" -name "*.py" -type f); do
              if ! python -m py_compile "$pyfile" 2>&1; then
                SYNTAX_ERRORS="$SYNTAX_ERRORS\n   - $pyfile"
                FAILED=1
              fi
            done
            if [ -n "$SYNTAX_ERRORS" ]; then
              echo "❌ SYNTAX ERRORS FOUND:"
              echo -e "$SYNTAX_ERRORS"
              echo ""
              echo "   Fix: Check the Python files above for syntax errors"
              echo "   Run locally: python -m py_compile <file.py>"
              echo ""
            else
              echo "   ✅ Syntax OK"
              echo ""
            fi

            # Import check
            echo "📥 Checking imports..."
            if [ -f "$dir/config.json" ]; then
              ENTRY_POINT=$(python -c "import json; print(json.load(open('$dir/config.json')).get('entry_point', ''))" 2>/dev/null || echo "")
              if [ -n "$ENTRY_POINT" ] && [ -f "$dir/$ENTRY_POINT" ]; then
                if ! python scripts/check_imports.py "$dir/$ENTRY_POINT" 2>&1; then
                  echo "❌ IMPORT ERRORS in $dir/$ENTRY_POINT"
                  echo ""
                  echo "   Fix: Install missing packages in requirements.txt"
                  echo "   Or check if package name is spelled correctly"
                  echo ""
                  FAILED=1
                else
                  echo "   ✅ Imports OK"
                  echo ""
                fi
              fi
            fi

            # JSON check
            echo "📄 Checking JSON files..."
            JSON_ERRORS=""
            for jsonfile in $(find "$dir" -name "*.json" -type f); do
              if ! python -m json.tool "$jsonfile" > /dev/null 2>&1; then
                JSON_ERRORS="$JSON_ERRORS\n   - $jsonfile"
                FAILED=1
              fi
            done
            if [ -n "$JSON_ERRORS" ]; then
              echo "❌ INVALID JSON FILES:"
              echo -e "$JSON_ERRORS"
              echo ""
              echo "   Fix: Check for missing commas, quotes, or brackets"
              echo "   Validate at: https://jsonlint.com/"
              echo ""
            else
              echo "   ✅ JSON files OK"
              echo ""
            fi
          done

          echo "========================================"
          if [ $FAILED -eq 1 ]; then
            echo "❌ CODE CHECK FAILED"
            echo "========================================"
            exit 1
          fi
          echo "✅ CODE CHECK PASSED"
          echo "========================================"

      - name: README Check
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.dirs != ''
        run: |
          echo ""
          echo "========================================"
          echo "📝 README CHECK"
          echo "========================================"
          echo ""

          README_CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep "^README\.md$" || true)

          FAILED=0
          for dir in ${{ steps.changed-files.outputs.dirs }}; do
            if [ -d "$dir" ]; then
              NEW_FILES=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }} HEAD | grep "^$dir/" || true)
              if [ -n "$NEW_FILES" ] && [ -z "$README_CHANGED" ]; then
                echo "❌ NEW INTEGRATION DETECTED: '$dir'"
                echo ""
                echo "   But main README.md was NOT updated!"
                echo ""
                echo "   Fix: Add your integration to the main README.md file"
                echo "   Example:"
                echo "   | $dir | Your description | Auth Type |"
                echo ""
                FAILED=1
              fi
            fi
          done

          echo "========================================"
          if [ $FAILED -eq 1 ]; then
            echo "❌ README CHECK FAILED"
            echo "========================================"
            exit 1
          fi
          echo "✅ README CHECK PASSED"
          echo "========================================"
